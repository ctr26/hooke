[project]
name = "vcb"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "loguru>=0.7.3",
    "polars>=1.33.0",
    "pydantic>=2.11.7",
    "scikit-learn>=1.7.1",
    "scipy>=1.16.1",
    "tqdm>=4.67.1",
    "typer>=0.17.3",
    "zarr>=3.1.2",
]

[build-system]
requires = [
    "setuptools",
    "setuptools-scm",
    "wheel",
]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "ruff>=0.12.11",
]

[project.scripts]
vcb = "vcb.cli:app"

[project.optional-dependencies]
state = [
    "arc-state>=0.9.14",
    "lightning>=2.5.5",
    "torch>=2.8.0",
]
