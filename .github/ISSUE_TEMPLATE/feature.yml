name: Feature Request
description: Propose a new feature or enhancement
labels: [feat]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches were considered?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2

  - type: textarea
    id: related
    attributes:
      label: Related Issues
      description: Link to related issues if any
