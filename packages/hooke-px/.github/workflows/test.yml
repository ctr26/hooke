name: test

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches:
      - "*"
      - "!gh-pages"
  schedule:
    - cron: "0 4 * * MON"

concurrency:
  group: "test-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test-uv:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]
        os: [ "ubuntu-latest", "macos-latest" ]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash -l {0}

    name: PyPi os=${{ matrix.os }} - python=${{ matrix.python-version }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --all-groups --python ${{ matrix.python-version }}
      
      # NOTE (cwognum): We can enable these next two lines of code once we actually have tests.
      # - name: Run tests
      #   run: uv run pytest

      - name: Test Training CLI
        run: uv run hooke-train --help

      - name: Test Evaluation CLI
        run: uv run hooke-eval --help

      - name: Test Inference CLI
        run: uv run hooke-infer --help