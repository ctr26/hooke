[project]
name = "hooke-forge"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "accelerate>=1.11.0",
    "datasets>=4.4.1",
    "diffusers>=0.34.0",
    "imagecodecs>=2025.3.30",
    "ipykernel>=6.29.5",
    "matplotlib>=3.10.3",
    "numpy>=2.3.1",
    "omegaconf>=2.3.0",
    "ornamentalist>=2.1.0",
    "polars>=1.31.0",
    "scikit-learn>=1.7.1",
    "scipy>=1.16.0",
    "submitit>=1.5.3",
    "timm>=1.0.17",
    "torch>=2.7.1",
    "torchdiffeq>=0.2.5",
    "torchvision>=0.22.1",
    "tqdm>=4.67.1",
    "wandb>=0.21.0",
    "zarr>=3.1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hooke_forge"]

[project.scripts]
hooke-train = "hooke_forge.training.train:cli"
hooke-eval = "hooke_forge.evaluation.eval:cli"
hooke-infer = "hooke_forge.inference.run_distributed:main"
