[project]
name = "vcb"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "typer>=0.17.3",
]

[build-system]
requires = [
    "setuptools",
    "setuptools-scm",
    "wheel",
]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "ruff>=0.12.11",
]

[project.scripts]
vcb = "vcb.cli:app"
